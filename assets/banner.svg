<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with deep gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c10;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0c10;stop-opacity:1" />
    </linearGradient>
    <clipPath id="centerClip">
      <rect x="0" y="0" width="1280" height="400" />
    </clipPath>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Animated Logo Integrated at Center (approx 160px size) -->
  <g transform="translate(640, 200) scale(4)">
     <!-- This is a simplified version of our logo.svg logic for the banner -->
     <defs>
       <filter id="glow">
         <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
         <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
       </filter>
     </defs>
     
     <!-- Orbital dots (Sample for banner) -->
     <g style="animation: rotate 20s linear infinite; transform-origin: center;">
        <circle cx="0" cy="0" r="38" fill="none" stroke="rgba(0,229,255,0.1)" stroke-width="0.5" />
        <circle cx="38" cy="0" r="1" fill="#00e5ff" />
        <circle cx="-38" cy="10" r="0.8" fill="#00e5ff" opacity="0.5" />
     </g>

     <!-- Central IGS -->
     <circle cx="0" cy="0" r="30" fill="rgba(0,229,255,0.05)" stroke="rgba(0,229,255,0.3)" stroke-width="1" />
     <text x="0" y="5" font-family="Arial, sans-serif" font-weight="900" font-size="20" fill="#00e5ff" text-anchor="middle" filter="url(#glow)">IGS</text>
  </g>

  <!-- Title Text -->
  <text x="640" y="340" font-family="Arial, sans-serif" font-weight="800" font-size="42" fill="#fff" text-anchor="middle" style="letter-spacing:5px">
    INDO <tspan fill="#00e5ff">GLOBAL</tspan> SERVICES
  </text>
  <text x="640" y="370" font-family="Arial, sans-serif" font-weight="400" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle">
    High-Performance Investment Ecosystem
  </text>

  <style>
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</svg>
