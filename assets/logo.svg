      <circle cx="88" cy="88" r="1.1" fill="#00e5ff"/> <circle cx="85" cy="90" r="0.6" fill="#3f51b5"/> <circle cx="82" cy="87" r="0.8" fill="#7000ff"/> <circle cx="78" cy="89" r="0.4" fill="#00e5ff"/>
      <circle cx="86" cy="83" r="1" fill="#3f51b5"/> <circle cx="90" cy="85" r="0.7" fill="#7000ff"/> <circle cx="84" cy="80" r="0.6" fill="#00e5ff"/> <circle cx="87" cy="76" r="0.5" fill="#3f51b5"/>
      <circle cx="80" cy="85" r="1.3" fill="#7000ff"/> <circle cx="76" cy="82" r="0.9" fill="#00e5ff"/> <circle cx="78" cy="78" r="0.7" fill="#3f51b5"/> <circle cx="82" cy="74" r="0.8" fill="#7000ff"/>
      <circle cx="72" cy="88" r="1" fill="#00e5ff"/> <circle cx="68" cy="85" r="0.6" fill="#3f51b5"/> <circle cx="70" cy="80" r="0.8" fill="#7000ff"/> <circle cx="74" cy="76" r="0.4" fill="#00e5ff"/>
      <circle cx="65" cy="82" r="1.2" fill="#3f51b5"/> <circle cx="68" cy="75" r="0.7" fill="#00e5ff"/> <circle cx="62" cy="78" r="0.6" fill="#7000ff"/> <circle cx="58" cy="85" r="0.5" fill="#3f51b5"/>
      <circle cx="82" cy="68" r="0.8" fill="#7000ff"/> <circle cx="78" cy="65" r="0.4" fill="#00e5ff"/> <circle cx="85" cy="62" r="0.6" fill="#3f51b5"/> <circle cx="74" cy="62" r="1" fill="#7000ff"/>
      <circle cx="68" cy="68" r="1.1" fill="#00e5ff"/> <circle cx="65" cy="62" r="0.8" fill="#3f51b5"/> <circle cx="58" cy="68" r="0.5" fill="#7000ff"/> <circle cx="62" cy="60" r="0.6" fill="#00e5ff"/>
      <circle cx="90" cy="55" r="1.2" fill="#3f51b5"/> <circle cx="86" cy="52" r="0.7" fill="#00e5ff"/> <circle cx="82" cy="58" r="0.8" fill="#7000ff"/> <circle cx="88" cy="60" r="0.4" fill="#3f51b5"/>

      <!-- Fill-in Central Noise (Hundreds of tiny dots) -->
      <path d="M40,20 L60,20 L60,80 L40,80 Z" fill="none" /> <!-- Area guide -->
      <circle cx="50" cy="18" r="0.5" fill="#ffd700"/> <circle cx="48" cy="20" r="0.3" fill="#00e5ff"/> <circle cx="52" cy="20" r="0.3" fill="#7000ff"/> <circle cx="50" cy="22" r="0.4" fill="#3f51b5"/>
      <circle cx="45" cy="10" r="0.6" fill="#ffd700"/> <circle cx="55" cy="10" r="0.6" fill="#ffd700"/> <circle cx="50" cy="30" r="0.5" fill="#ffd700"/> <circle cx="50" cy="70" r="0.5" fill="#ffd700"/>
      <circle cx="40" cy="40" r="0.3" fill="#ffffff"/> <circle cx="60" cy="40" r="0.3" fill="#ffffff"/> <circle cx="40" cy="60" r="0.3" fill="#ffffff"/> <circle cx="60" cy="60" r="0.3" fill="#ffffff"/>
      <!-- Repeat clusters systematically -->
      <circle cx="31" cy="44" r="0.4" fill="#00e5ff"/> <circle cx="33" cy="46" r="0.4" fill="#7000ff"/> <circle cx="35" cy="48" r="0.4" fill="#3f51b5"/>
      <circle cx="69" cy="44" r="0.4" fill="#7000ff"/> <circle cx="67" cy="46" r="0.4" fill="#00e5ff"/> <circle cx="65" cy="48" r="0.4" fill="#3f51b5"/>
      <circle cx="40" cy="74" r="0.4" fill="#3f51b5"/> <circle cx="42" cy="76" r="0.4" fill="#00e5ff"/> <circle cx="44" cy="78" r="0.4" fill="#7000ff"/>
      <circle cx="60" cy="74" r="0.4" fill="#00e5ff"/> <circle cx="58" cy="76" r="0.4" fill="#7000ff"/> <circle cx="56" cy="78" r="0.4" fill="#3f51b5"/>
