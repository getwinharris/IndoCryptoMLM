<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes rotateClockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes rotateCounterClockwise {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    .orbit-slow { animation: rotateClockwise 20s linear infinite; transform-origin: center; }
    .orbit-fast { animation: rotateCounterClockwise 12s linear infinite; transform-origin: center; }
    .orbit-mid { animation: rotateClockwise 15s linear infinite; transform-origin: center; }
    .dot-pulse { animation: pulse 3s ease-in-out infinite; }
  </style>

  <defs>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0091ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7000ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a00e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="indigo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3f51b5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a237e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.7" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Animated Orbital Transaction Dots (Infinite Crowd) -->
  
  <!-- Outer Slow Orbit -->
  <g class="orbit-slow">
    <circle cx="15" cy="15" r="1.2" fill="#00e5ff" class="dot-pulse" style="animation-delay: 0s;"/>
    <circle cx="85" cy="15" r="1.5" fill="#7000ff" class="dot-pulse" style="animation-delay: 0.5s;"/>
    <circle cx="15" cy="85" r="1" fill="#3f51b5" class="dot-pulse" style="animation-delay: 1s;"/>
    <circle cx="85" cy="85" r="1.3" fill="#00e5ff" class="dot-pulse" style="animation-delay: 1.5s;"/>
    <circle cx="50" cy="5" r="1.1" fill="#7000ff" />
    <circle cx="50" cy="95" r="1.1" fill="#00e5ff" />
    <circle cx="5" cy="50" r="1" fill="#3f51b5" />
    <circle cx="95" cy="50" r="1" fill="#ffd700" />
    <!-- Filling gaps in slow orbit -->
    <circle cx="30" cy="10" r="0.6" fill="#00e5ff" /> <circle cx="70" cy="10" r="0.6" fill="#7000ff" />
    <circle cx="30" cy="90" r="0.6" fill="#3f51b5" /> <circle cx="70" cy="90" r="0.6" fill="#00e5ff" />
  </g>

  <!-- Mid Orbit -->
  <g class="orbit-mid">
    <circle cx="25" cy="25" r="0.9" fill="#7000ff" /> <circle cx="75" cy="25" r="0.9" fill="#00e5ff" />
    <circle cx="25" cy="75" r="0.9" fill="#3f51b5" /> <circle cx="75" cy="75" r="0.9" fill="#7000ff" />
    <circle cx="50" cy="20" r="1.2" fill="#00e5ff" class="dot-pulse" />
    <circle cx="50" cy="80" r="1.2" fill="#7000ff" class="dot-pulse" />
    <circle cx="20" cy="50" r="1" fill="#3f51b5" />
    <circle cx="80" cy="50" r="1" fill="#ffd700" />
    <!-- More micro dots -->
    <circle cx="35" cy="15" r="0.4" fill="#00e5ff" /> <circle cx="65" cy="15" r="0.4" fill="#7000ff" />
    <circle cx="15" cy="35" r="0.4" fill="#3f51b5" /> <circle cx="85" cy="35" r="0.4" fill="#00e5ff" />
  </g>

  <!-- Fast Inner Orbit -->
  <g class="orbit-fast">
    <circle cx="35" cy="35" r="0.7" fill="#00e5ff" /> <circle cx="65" cy="35" r="0.7" fill="#7000ff" />
    <circle cx="35" cy="65" r="0.7" fill="#3f51b5" /> <circle cx="65" cy="65" r="0.7" fill="#00e5ff" />
    <circle cx="50" cy="30" r="1" fill="#7000ff" /> <circle cx="50" cy="70" r="1" fill="#3f51b5" />
    <circle cx="30" cy="50" r="1" fill="#00e5ff" /> <circle cx="70" cy="50" r="1" fill="#ffd700" />
    <!-- High frequency clusters -->
    <circle cx="42" cy="32" r="0.3" fill="#00e5ff" /> <circle cx="58" cy="32" r="0.3" fill="#7000ff" />
    <circle cx="42" cy="68" r="0.3" fill="#7000ff" /> <circle cx="58" cy="68" r="0.3" fill="#00e5ff" />
  </g>

  <!-- Static Central IGS Base (The "Sun" around which they orbit) -->
  <g filter="url(#shadow)">
    <!-- Blue (I) -->
    <circle cx="37" cy="41" r="18" fill="url(#blue-grad)" />
    <text x="37" y="48" font-family="Arial, sans-serif" font-weight="900" font-size="16" fill="white" text-anchor="middle">I</text>
    
    <!-- Purple (G) -->
    <circle cx="63" cy="41" r="18" fill="url(#purple-grad)" />
    <text x="63" y="48" font-family="Arial, sans-serif" font-weight="900" font-size="16" fill="white" text-anchor="middle">G</text>
    
    <!-- Indigo (S) -->
    <circle cx="50" cy="65" r="18" fill="url(#indigo-grad)" />
    <text x="50" y="72" font-family="Arial, sans-serif" font-weight="900" font-size="16" fill="white" text-anchor="middle">S</text>
  </g>
</svg>
