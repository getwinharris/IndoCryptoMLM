<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="silver-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b0b0b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0091ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7000ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a00e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="indigo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3f51b5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a237e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.6" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="inner-mask">
      <circle cx="50" cy="50" r="45.5" />
    </clipPath>
  </defs>
  
  <!-- Outer Silver Frame -->
  <circle cx="50" cy="50" r="48" fill="url(#silver-grad)" stroke="#999" stroke-width="0.3" />
  <circle cx="50" cy="50" r="45.5" fill="#ffffff" />
  
  <!-- Content Clipped to Inner Circle -->
  <g clip-path="url(#inner-mask)">
    <!-- Extreme Density Level 1: Sparse large base -->
    <g opacity="0.6">
      <circle cx="20" cy="20" r="3" fill="#00e5ff" opacity="0.3"/> <circle cx="80" cy="20" r="3" fill="#7000ff" opacity="0.3"/>
      <circle cx="20" cy="80" r="3" fill="#3f51b5" opacity="0.3"/> <circle cx="80" cy="80" r="3" fill="#00e5ff" opacity="0.3"/>
      <circle cx="50" cy="15" r="4" fill="#7000ff" opacity="0.2"/> <circle cx="50" cy="85" r="4" fill="#3f51b5" opacity="0.2"/>
    </g>

    <!-- Extreme Density Level 2: 500+ Transaction Micro-dots clustered -->
    <g opacity="0.9">
      <!-- Northwest Sector -->
      <circle cx="12" cy="12" r="1.1" fill="#00e5ff"/> <circle cx="15" cy="10" r="0.6" fill="#7000ff"/> <circle cx="18" cy="13" r="0.8" fill="#3f51b5"/> <circle cx="22" cy="11" r="0.4" fill="#00e5ff"/>
      <circle cx="14" cy="17" r="1" fill="#7000ff"/> <circle cx="10" cy="15" r="0.7" fill="#3f51b5"/> <circle cx="16" cy="20" r="0.6" fill="#00e5ff"/> <circle cx="13" cy="24" r="0.5" fill="#7000ff"/>
      <circle cx="20" cy="15" r="1.3" fill="#3f51b5"/> <circle cx="24" cy="18" r="0.9" fill="#00e5ff"/> <circle cx="22" cy="22" r="0.7" fill="#7000ff"/> <circle cx="18" cy="26" r="0.8" fill="#3f51b5"/>
      <circle cx="28" cy="12" r="1" fill="#00e5ff"/> <circle cx="32" cy="15" r="0.6" fill="#7000ff"/> <circle cx="30" cy="20" r="0.8" fill="#3f51b5"/> <circle cx="26" cy="24" r="0.4" fill="#00e5ff"/>
      <circle cx="35" cy="18" r="1.2" fill="#7000ff"/> <circle cx="32" cy="25" r="0.7" fill="#3f51b5"/> <circle cx="38" cy="22" r="0.6" fill="#00e5ff"/> <circle cx="42" cy="15" r="0.5" fill="#7000ff"/>
      <circle cx="18" cy="32" r="0.8" fill="#3f51b5"/> <circle cx="22" cy="35" r="0.4" fill="#00e5ff"/> <circle cx="15" cy="38" r="0.6" fill="#7000ff"/> <circle cx="26" cy="38" r="1" fill="#3f51b5"/>
      <circle cx="32" cy="32" r="1.1" fill="#00e5ff"/> <circle cx="35" cy="38" r="0.8" fill="#7000ff"/> <circle cx="42" cy="32" r="0.5" fill="#3f51b5"/> <circle cx="38" cy="40" r="0.6" fill="#00e5ff"/>
      <circle cx="10" cy="45" r="1.2" fill="#7000ff"/> <circle cx="14" cy="48" r="0.7" fill="#3f51b5"/> <circle cx="18" cy="42" r="0.8" fill="#00e5ff"/> <circle cx="12" cy="40" r="0.4" fill="#7000ff"/>

      <!-- Northeast Sector -->
      <circle cx="88" cy="12" r="1.1" fill="#7000ff"/> <circle cx="85" cy="10" r="0.6" fill="#00e5ff"/> <circle cx="82" cy="13" r="0.8" fill="#3f51b5"/> <circle cx="78" cy="11" r="0.4" fill="#7000ff"/>
      <circle cx="86" cy="17" r="1" fill="#00e5ff"/> <circle cx="90" cy="15" r="0.7" fill="#3f51b5"/> <circle cx="84" cy="20" r="0.6" fill="#7000ff"/> <circle cx="87" cy="24" r="0.5" fill="#00e5ff"/>
      <circle cx="80" cy="15" r="1.3" fill="#3f51b5"/> <circle cx="76" cy="18" r="0.9" fill="#7000ff"/> <circle cx="78" cy="22" r="0.7" fill="#00e5ff"/> <circle cx="82" cy="26" r="0.8" fill="#3f51b5"/>
      <circle cx="72" cy="12" r="1" fill="#7000ff"/> <circle cx="68" cy="15" r="0.6" fill="#00e5ff"/> <circle cx="70" cy="20" r="0.8" fill="#3f51b5"/> <circle cx="74" cy="24" r="0.4" fill="#7000ff"/>
      <circle cx="65" cy="18" r="1.2" fill="#00e5ff"/> <circle cx="68" cy="25" r="0.7" fill="#3f51b5"/> <circle cx="62" cy="22" r="0.6" fill="#7000ff"/> <circle cx="58" cy="15" r="0.5" fill="#00e5ff"/>
      <circle cx="82" cy="32" r="0.8" fill="#3f51b5"/> <circle cx="78" cy="35" r="0.4" fill="#7000ff"/> <circle cx="85" cy="38" r="0.6" fill="#00e5ff"/> <circle cx="74" cy="38" r="1" fill="#3f51b5"/>
      <circle cx="68" cy="32" r="1.1" fill="#7000ff"/> <circle cx="65" cy="38" r="0.8" fill="#00e5ff"/> <circle cx="58" cy="32" r="0.5" fill="#3f51b5"/> <circle cx="62" cy="40" r="0.6" fill="#7000ff"/>
      <circle cx="90" cy="45" r="1.2" fill="#00e5ff"/> <circle cx="86" cy="48" r="0.7" fill="#3f51b5"/> <circle cx="82" cy="42" r="0.8" fill="#7000ff"/> <circle cx="88" cy="40" r="0.4" fill="#00e5ff"/>

      <!-- Southwest Sector -->
      <circle cx="12" cy="88" r="1.1" fill="#3f51b5"/> <circle cx="15" cy="90" r="0.6" fill="#00e5ff"/> <circle cx="18" cy="87" r="0.8" fill="#7000ff"/> <circle cx="22" cy="89" r="0.4" fill="#3f51b5"/>
      <circle cx="14" cy="83" r="1" fill="#00e5ff"/> <circle cx="10" cy="85" r="0.7" fill="#7000ff"/> <circle cx="16" cy="80" r="0.6" fill="#3f51b5"/> <circle cx="13" cy="76" r="0.5" fill="#00e5ff"/>
      <circle cx="20" cy="85" r="1.3" fill="#7000ff"/> <circle cx="24" cy="82" r="0.9" fill="#3f51b5"/> <circle cx="22" cy="78" r="0.7" fill="#00e5ff"/> <circle cx="18" cy="74" r="0.8" fill="#7000ff"/>
      <circle cx="28" cy="88" r="1" fill="#3f51b5"/> <circle cx="32" cy="85" r="0.6" fill="#00e5ff"/> <circle cx="30" cy="80" r="0.8" fill="#7000ff"/> <circle cx="26" cy="76" r="0.4" fill="#3f51b5"/>
      <circle cx="35" cy="82" r="1.2" fill="#00e5ff"/> <circle cx="32" cy="75" r="0.7" fill="#7000ff"/> <circle cx="38" cy="78" r="0.6" fill="#3f51b5"/> <circle cx="42" cy="85" r="0.5" fill="#00e5ff"/>
      <circle cx="18" cy="68" r="0.8" fill="#7000ff"/> <circle cx="22" cy="65" r="0.4" fill="#3f51b5"/> <circle cx="15" cy="62" r="0.6" fill="#00e5ff"/> <circle cx="26" cy="62" r="1" fill="#7000ff"/>
      <circle cx="32" cy="68" r="1.1" fill="#3f51b5"/> <circle cx="35" cy="62" r="0.8" fill="#00e5ff"/> <circle cx="42" cy="68" r="0.5" fill="#7000ff"/> <circle cx="38" cy="60" r="0.6" fill="#3f51b5"/>
      <circle cx="10" cy="55" r="1.2" fill="#00e5ff"/> <circle cx="14" cy="52" r="0.7" fill="#7000ff"/> <circle cx="18" cy="58" r="0.8" fill="#3f51b5"/> <circle cx="12" cy="60" r="0.4" fill="#00e5ff"/>

