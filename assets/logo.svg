    <!-- Scaled Central IGS Branding Mark (MASSIVE IMPACT) -->
    <g filter="url(#shadow)">
      <!-- Blue (I) -->
      <circle cx="37" cy="41" r="18" fill="url(#blue-grad)" />
      <text x="37" y="48" font-family="Arial, sans-serif" font-weight="900" font-size="16" fill="white" text-anchor="middle">I</text>
      
      <!-- Purple (G) -->
      <circle cx="63" cy="41" r="18" fill="url(#purple-grad)" />
      <text x="63" y="48" font-family="Arial, sans-serif" font-weight="900" font-size="16" fill="white" text-anchor="middle">G</text>
      
      <!-- Indigo (S) -->
      <circle cx="50" cy="65" r="18" fill="url(#indigo-grad)" />
      <text x="50" y="72" font-family="Arial, sans-serif" font-weight="900" font-size="16" fill="white" text-anchor="middle">S</text>
    </g>
  </g>
</svg>
