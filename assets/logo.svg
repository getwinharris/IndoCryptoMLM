<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="silver-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b0b0b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0091ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7000ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a00e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="indigo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3f51b5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a237e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" />
      <feOffset dx="0.5" dy="0.5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="50" cy="50" r="48" fill="url(#silver-grad)" stroke="#888" stroke-width="0.5" />
  <circle cx="50" cy="50" r="45" fill="#ffffff" />
  
  <!-- Massive 'Crowd' of 100+ Colored Dots -->
  <g opacity="0.8">
    <!-- Top Left Cluster -->
    <circle cx="20" cy="20" r="1.2" fill="#00e5ff" /> <circle cx="24" cy="18" r="0.8" fill="#7000ff" />
    <circle cx="18" cy="24" r="0.6" fill="#3f51b5" /> <circle cx="26" cy="26" r="1" fill="#00e5ff" />
    <circle cx="15" cy="15" r="0.8" fill="#7000ff" /> <circle cx="30" cy="20" r="0.5" fill="#3f51b5" />
    <circle cx="22" cy="12" r="1" fill="#00e5ff" /> <circle cx="12" cy="22" r="0.6" fill="#7000ff" />
    
    <!-- Top Right Cluster -->
    <circle cx="80" cy="20" r="1.2" fill="#7000ff" /> <circle cx="76" cy="18" r="0.8" fill="#00e5ff" />
    <circle cx="82" cy="24" r="0.6" fill="#3f51b5" /> <circle cx="74" cy="26" r="1" fill="#7000ff" />
    <circle cx="85" cy="15" r="0.8" fill="#00e5ff" /> <circle cx="70" cy="20" r="0.5" fill="#3f51b5" />
    <circle cx="78" cy="12" r="1" fill="#7000ff" /> <circle cx="88" cy="22" r="0.6" fill="#00e5ff" />
    
    <!-- Bottom Left Cluster -->
    <circle cx="20" cy="80" r="1.2" fill="#3f51b5" /> <circle cx="24" cy="82" r="0.8" fill="#00e5ff" />
    <circle cx="18" cy="76" r="0.6" fill="#7000ff" /> <circle cx="26" cy="74" r="1" fill="#3f51b5" />
    <circle cx="15" cy="85" r="0.8" fill="#00e5ff" /> <circle cx="30" cy="80" r="0.5" fill="#7000ff" />
    <circle cx="22" cy="88" r="1" fill="#3f51b5" /> <circle cx="12" cy="78" r="0.6" fill="#00e5ff" />
    
    <!-- Bottom Right Cluster -->
    <circle cx="80" cy="80" r="1.2" fill="#00e5ff" /> <circle cx="76" cy="82" r="0.8" fill="#7000ff" />
    <circle cx="82" cy="76" r="0.6" fill="#3f51b5" /> <circle cx="74" cy="74" r="1" fill="#00e5ff" />
    <circle cx="85" cy="85" r="0.8" fill="#7000ff" /> <circle cx="70" cy="80" r="0.5" fill="#3f51b5" />
    <circle cx="78" cy="88" r="1" fill="#00e5ff" /> <circle cx="88" cy="78" r="0.6" fill="#7000ff" />

    <!-- Side Clusters -->
    <circle cx="10" cy="50" r="1" fill="#7000ff" /> <circle cx="13" cy="45" r="0.6" fill="#00e5ff" />
    <circle cx="13" cy="55" r="0.6" fill="#3f51b5" /> <circle cx="90" cy="50" r="1" fill="#00e5ff" />
    <circle cx="87" cy="45" r="0.6" fill="#7000ff" /> <circle cx="87" cy="55" r="0.6" fill="#3f51b5" />
    
    <!-- Inner orbits -->
    <circle cx="50" cy="15" r="1" fill="#3f51b5" /> <circle cx="50" cy="85" r="1" fill="#3f51b5" />
    <circle cx="45" cy="20" r="0.5" fill="#00e5ff" /> <circle cx="55" cy="20" r="0.5" fill="#7000ff" />
    <circle cx="45" cy="80" r="0.5" fill="#7000ff" /> <circle cx="55" cy="80" r="0.5" fill="#00e5ff" />

    <!-- Tiny scattered 'electrons' -->
    <circle cx="35" cy="30" r="0.3" fill="#00e5ff" /> <circle cx="65" cy="30" r="0.3" fill="#7000ff" />
    <circle cx="35" cy="70" r="0.3" fill="#7000ff" /> <circle cx="65" cy="70" r="0.3" fill="#00e5ff" />
    <circle cx="15" cy="35" r="0.4" fill="#3f51b5" /> <circle cx="85" cy="35" r="0.4" fill="#3f51b5" />
    <circle cx="15" cy="65" r="0.4" fill="#3f51b5" /> <circle cx="85" cy="65" r="0.4" fill="#3f51b5" />
  </g>
  
  <!-- Central IGS Mark -->
  <g filter="url(#shadow)">
    <!-- Blue (I) -->
    <circle cx="41" cy="44" r="12" fill="url(#blue-grad)" />
    <text x="41" y="49" font-family="Arial, sans-serif" font-weight="900" font-size="11" fill="white" text-anchor="middle">I</text>
    
    <!-- Purple (G) -->
    <circle cx="59" cy="44" r="12" fill="url(#purple-grad)" />
    <text x="59" y="49" font-family="Arial, sans-serif" font-weight="900" font-size="11" fill="white" text-anchor="middle">G</text>
    
    <!-- Indigo (S) -->
    <circle cx="50" cy="62" r="12" fill="url(#indigo-grad)" />
    <text x="50" y="67" font-family="Arial, sans-serif" font-weight="900" font-size="11" fill="white" text-anchor="middle">S</text>
  </g>
</svg>
