<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="silver-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b0b0b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0091ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7000ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a00e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="indigo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3f51b5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a237e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" />
      <feOffset dx="0.5" dy="0.5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="50" cy="50" r="48" fill="url(#silver-grad)" stroke="#888" stroke-width="0.5" />
  <circle cx="50" cy="50" r="45" fill="#ffffff" />
  
  <!-- Ultra-High Density 'Transaction Crowd' (150+ dots) -->
  <g opacity="0.8">
    <!-- Blue Electrons -->
    <circle cx="20" cy="20" r="1.2" fill="#00e5ff"/> <circle cx="21" cy="24" r="0.6" fill="#00e5ff"/> <circle cx="18" cy="22" r="0.8" fill="#00e5ff"/> <circle cx="25" cy="18" r="0.4" fill="#00e5ff"/>
    <circle cx="28" cy="25" r="1" fill="#00e5ff"/> <circle cx="32" cy="18" r="0.7" fill="#00e5ff"/> <circle cx="35" cy="25" r="0.6" fill="#00e5ff"/> <circle cx="12" cy="28" r="0.9" fill="#00e5ff"/>
    <circle cx="15" cy="15" r="1.1" fill="#00e5ff"/> <circle cx="45" cy="15" r="0.8" fill="#00e5ff"/> <circle cx="42" cy="22" r="0.5" fill="#00e5ff"/> <circle cx="38" cy="12" r="0.6" fill="#00e5ff"/>
    <circle cx="70" cy="70" r="1.2" fill="#00e5ff"/> <circle cx="72" cy="75" r="0.6" fill="#00e5ff"/> <circle cx="68" cy="72" r="0.8" fill="#00e5ff"/> <circle cx="75" cy="68" r="0.4" fill="#00e5ff"/>
    <circle cx="78" cy="78" r="1" fill="#00e5ff"/> <circle cx="82" cy="72" r="0.7" fill="#00e5ff"/> <circle cx="85" cy="78" r="0.6" fill="#00e5ff"/> <circle cx="62" cy="78" r="0.9" fill="#00e5ff"/>
    <circle cx="65" cy="65" r="1.1" fill="#00e5ff"/> <circle cx="85" cy="65" r="0.8" fill="#00e5ff"/> <circle cx="82" cy="62" r="0.5" fill="#00e5ff"/> <circle cx="88" cy="82" r="0.6" fill="#00e5ff"/>
    
    <!-- Purple Electrons -->
    <circle cx="80" cy="20" r="1.2" fill="#7000ff"/> <circle cx="79" cy="24" r="0.6" fill="#7000ff"/> <circle cx="82" cy="22" r="0.8" fill="#7000ff"/> <circle cx="75" cy="18" r="0.4" fill="#7000ff"/>
    <circle cx="72" cy="25" r="1" fill="#7000ff"/> <circle cx="68" cy="18" r="0.7" fill="#7000ff"/> <circle cx="65" cy="25" r="0.6" fill="#7000ff"/> <circle cx="88" cy="28" r="0.9" fill="#7000ff"/>
    <circle cx="85" cy="15" r="1.1" fill="#7000ff"/> <circle cx="55" cy="15" r="0.8" fill="#7000ff"/> <circle cx="58" cy="22" r="0.5" fill="#7000ff"/> <circle cx="62" cy="12" r="0.6" fill="#7000ff"/>
    <circle cx="30" cy="70" r="1.2" fill="#7000ff"/> <circle cx="28" cy="75" r="0.6" fill="#7000ff"/> <circle cx="32" cy="72" r="0.8" fill="#7000ff"/> <circle cx="25" cy="68" r="0.4" fill="#7000ff"/>
    <circle cx="22" cy="78" r="1" fill="#7000ff"/> <circle cx="18" cy="72" r="0.7" fill="#7000ff"/> <circle cx="15" cy="78" r="0.6" fill="#7000ff"/> <circle cx="38" cy="78" r="0.9" fill="#7000ff"/>
    <circle cx="35" cy="65" r="1.1" fill="#7000ff"/> <circle cx="15" cy="65" r="0.8" fill="#7000ff"/> <circle cx="18" cy="62" r="0.5" fill="#7000ff"/> <circle cx="12" cy="82" r="0.6" fill="#7000ff"/>

    <!-- Indigo Electrons -->
    <circle cx="15" cy="50" r="1.2" fill="#3f51b5"/> <circle cx="18" cy="53" r="0.6" fill="#3f51b5"/> <circle cx="12" cy="53" r="0.8" fill="#3f51b5"/> <circle cx="18" cy="47" r="0.4" fill="#3f51b5"/>
    <circle cx="85" cy="50" r="1.2" fill="#3f51b5"/> <circle cx="82" cy="53" r="0.6" fill="#3f51b5"/> <circle cx="88" cy="53" r="0.8" fill="#3f51b5"/> <circle cx="82" cy="47" r="0.4" fill="#3f51b5"/>
    <circle cx="50" cy="15" r="1.2" fill="#3f51b5"/> <circle cx="53" cy="18" r="0.6" fill="#3f51b5"/> <circle cx="47" cy="18" r="0.8" fill="#3f51b5"/> <circle cx="50" cy="12" r="0.4" fill="#3f51b5"/>
    <circle cx="50" cy="85" r="1.2" fill="#3f51b5"/> <circle cx="53" cy="82" r="0.6" fill="#3f51b5"/> <circle cx="47" cy="82" r="0.8" fill="#3f51b5"/> <circle cx="50" cy="88" r="0.4" fill="#3f51b5"/>

    <!-- Gold Accent Dots -->
    <circle cx="12" cy="12" r="0.8" fill="#ffd700"/> <circle cx="88" cy="12" r="0.8" fill="#ffd700"/> <circle cx="12" cy="88" r="0.8" fill="#ffd700"/> <circle cx="88" cy="88" r="0.8" fill="#ffd700"/>
    <circle cx="25" cy="50" r="0.5" fill="#ffd700"/> <circle cx="75" cy="50" r="0.5" fill="#ffd700"/> <circle cx="50" cy="25" r="0.5" fill="#ffd700"/> <circle cx="50" cy="75" r="0.5" fill="#ffd700"/>

    <!-- Dynamic Micro-dots Scattered Under Shadow Area -->
    <circle cx="35" cy="40" r="0.3" fill="#00e5ff"/> <circle cx="38" cy="42" r="0.3" fill="#7000ff"/> <circle cx="32" cy="45" r="0.3" fill="#3f51b5"/>
    <circle cx="65" cy="40" r="0.3" fill="#7000ff"/> <circle cx="62" cy="42" r="0.3" fill="#00e5ff"/> <circle cx="68" cy="45" r="0.3" fill="#3f51b5"/>
    <circle cx="50" cy="68" r="0.4" fill="#3f51b5"/> <circle cx="48" cy="70" r="0.3" fill="#00e5ff"/> <circle cx="52" cy="70" r="0.3" fill="#7000ff"/>
    
    <!-- Outer perimeter micro-noise -->
    <circle cx="40" cy="10" r="0.3" fill="#00e5ff"/> <circle cx="60" cy="10" r="0.3" fill="#7000ff"/> <circle cx="10" cy="40" r="0.3" fill="#3f51b5"/> <circle cx="10" cy="60" r="0.3" fill="#00e5ff"/>
    <circle cx="90" cy="40" r="0.3" fill="#7000ff"/> <circle cx="90" cy="60" r="0.3" fill="#3f51b5"/> <circle cx="40" cy="90" r="0.3" fill="#00e5ff"/> <circle cx="60" cy="90" r="0.3" fill="#7000ff"/>
    <circle cx="20" cy="10" r="0.3" fill="#7000ff"/> <circle cx="80" cy="10" r="0.3" fill="#3f51b5"/> <circle cx="10" cy="20" r="0.3" fill="#00e5ff"/> <circle cx="90" cy="20" r="0.3" fill="#7000ff"/>
    <circle cx="20" cy="90" r="0.3" fill="#3f51b5"/> <circle cx="80" cy="90" r="0.3" fill="#00e5ff"/> <circle cx="10" cy="80" r="0.3" fill="#7000ff"/> <circle cx="90" cy="80" r="0.3" fill="#3f51b5"/>
  </g>
  
  <!-- Final High-Resolution Central IGS Base -->
  <g filter="url(#shadow)">
    <!-- Blue (I) -->
    <circle cx="41" cy="44" r="12" fill="url(#blue-grad)" />
    <text x="41" y="49" font-family="Arial, sans-serif" font-weight="900" font-size="11" fill="white" text-anchor="middle">I</text>
    
    <!-- Purple (G) -->
    <circle cx="59" cy="44" r="12" fill="url(#purple-grad)" />
    <text x="59" y="49" font-family="Arial, sans-serif" font-weight="900" font-size="11" fill="white" text-anchor="middle">G</text>
    
    <!-- Indigo (S) -->
    <circle cx="50" cy="62" r="12" fill="url(#indigo-grad)" />
    <text x="50" y="67" font-family="Arial, sans-serif" font-weight="900" font-size="11" fill="white" text-anchor="middle">S</text>
  </g>
</svg>
