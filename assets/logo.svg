<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="silver-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b0b0b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0091ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7000ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a00e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="indigo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3f51b5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a237e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" />
      <feOffset dx="0.5" dy="0.5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="50" cy="50" r="48" fill="url(#silver-grad)" stroke="#888" stroke-width="0.5" />
  <circle cx="50" cy="50" r="44" fill="#f8f8f8" />
  
  <!-- Bubble deco dots -->
  <circle cx="20" cy="30" r="1.5" fill="#00e5ff" opacity="0.6" />
  <circle cx="80" cy="30" r="2" fill="#7000ff" opacity="0.6" />
  <circle cx="30" cy="80" r="1.8" fill="#3f51b5" opacity="0.6" />
  <circle cx="70" cy="80" r="1.2" fill="#00e5ff" opacity="0.5" />
  <circle cx="15" cy="50" r="1" fill="#7000ff" opacity="0.4" />
  <circle cx="85" cy="50" r="1.3" fill="#3f51b5" opacity="0.4" />
  
  <!-- Three Overlapping Rings -->
  <g filter="url(#shadow)">
    <!-- Blue Ring (I) -->
    <circle cx="40" cy="42" r="14" fill="url(#blue-grad)" />
    <text x="40" y="47" font-family="Arial, sans-serif" font-weight="900" font-size="12" fill="white" text-anchor="middle">I</text>
    
    <!-- Purple Ring (G) -->
    <circle cx="60" cy="42" r="14" fill="url(#purple-grad)" />
    <text x="60" y="47" font-family="Arial, sans-serif" font-weight="900" font-size="12" fill="white" text-anchor="middle">G</text>
    
    <!-- Indigo Ring (S) -->
    <circle cx="50" cy="62" r="14" fill="url(#indigo-grad)" />
    <text x="50" y="67" font-family="Arial, sans-serif" font-weight="900" font-size="12" fill="white" text-anchor="middle">S</text>
  </g>
</svg>
